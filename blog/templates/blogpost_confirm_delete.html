{% extends 'base.html' %}

{% block title %}Удаление {{ object.title }} - Блог Skystore{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body text-center">
                <h3 class="card-title text-danger">Удаление записи</h3>
                <p class="card-text">Вы уверены, что хотите удалить запись "{{ object.title }}"?</p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-2">
                        <button type="submit" class="btn btn-danger">Да, удалить</button>
                        <a href="{% url 'blog:post_detail' object.pk %}" class="btn btn-secondary">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
